name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Test
        run: uv run pytest -m "not integration and not llm" -q
