name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Test
        run: uv run pytest -m "not integration and not llm" -v --tb=short --junitxml=test-results.xml --cov=canary --cov-report=term-missing:skip-covered

      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: test-results.xml
        if: always()
